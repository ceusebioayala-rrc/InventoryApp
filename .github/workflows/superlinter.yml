name: Super-Linter

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Disable optional linters you don't need
          VALIDATE_CHECKOV: false

          # Auto-fix tools
          FIX_HTML_PRETTIER: true
          FIX_PYTHON_BLACK: true
          FIX_YAML_PRETTIER: true

          # JSCPD duplicate detection threshold
          JSCPD_THRESHOLD: 5

          PYTHON_PYLINT_CONFIG_FILE: .pylintrc

          # Ensure rules are loaded from repo root
          LINTER_RULES_PATH: .